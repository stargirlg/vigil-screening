version: '3.8'

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: vigil_db
      POSTGRES_USER: vigil_user
      POSTGRES_PASSWORD: vigil_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://vigil_user:vigil_pass@db:5432/vigil_db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis

volumes:
  postgres_data: