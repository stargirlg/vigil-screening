name: VIGIL CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: vigil_user
          POSTGRES_PASSWORD: vigil_pass
          POSTGRES_DB: vigil_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env
        run: |
          cp .env.example .env
          sed -i 's|postgresql://user:password@localhost:5432/vigil_db|postgresql://vigil_user:vigil_pass@localhost:5432/vigil_db|' .env

      - name: Compile check
        run: python -m compileall app

      - name: Run tests
        run: pytest tests/ -v
        env:
          DATABASE_URL: postgresql://vigil_user:vigil_pass@localhost:5432/vigil_db
          SECRET_KEY: test-secret-key-minimum-32-characters-long