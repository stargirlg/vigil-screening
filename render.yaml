services:
  - type: web
    name: vigil-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vigil-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 43200
      - key: ALGORITHM
        value: HS256
      - key: FUZZY_NAME_THRESHOLD
        value: 85
      - key: WEIGHT_NAME
        value: 25
      - key: WEIGHT_DOB
        value: 15
      - key: WEIGHT_ID
        value: 20
      - key: WEIGHT_NATIONALITY
        value: 10
      - key: WEIGHT_OCCUPATION
        value: 5
      - key: WEIGHT_ADVERSE_MEDIA
        value: 10
      - key: WEIGHT_PEP
        value: 15
      - key: APP_NAME
        value: VIGIL
      - key: GDELT_ENABLED
        value: false
      - key: NEWS_API_KEY
        value: ""
      - key: OFAC_SDN_URL
        value: https://sanctionslistservice.ofac.treas.gov/api/PublicationPreview/exports/SDN.XML
databases:
  - name: vigil-db
    databaseName: vigil_db
    user: vigil_user
    plan: free